CONFIG_ZMK_DISPLAY=n
#CONFIG_ZMK_USB_LOGGING=y # this no longer works

# RGB underglow for KB2040 onboard NeoPixel (layer indicator)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=120
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Raw HID for status reporting — disabled, conflicts with USB on KB2040
# Re-enable when moving to nice_nano (BLE) or after removing USB logging
#CONFIG_RAW_HID=y
